version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: kisehotel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      PORT: 5000
      JWT_SECRET: dev-secret-key
      DB_NAME: kisehotel
      DB_USER: postgres
      DB_PASSWORD: password
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

  frontend:
    image: node:18-alpine
    working_dir: /app/frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: /api
      VITE_PROXY_TARGET: http://backend:5000
    volumes:
      - ./frontend:/app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
