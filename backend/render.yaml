services:
  - type: web
    name: financial-dashboard-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade --force-reinstall --no-cache-dir -r requirements.txt
    startCommand: gunicorn -w 1 -t 120 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 10000
      - key: WEB_CONCURRENCY
        value: 1
      - key: PGCONNECT_TIMEOUT
        value: 5
